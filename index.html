<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTIP | HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --accent: #ff0000;
            --bg: #050505;
            --card: #0e0e0e;
            --text: #ffffff;
            --gray: #888;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* UI Elements */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(5,5,5,0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #1a1a1a;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
        }

        .nav-center {
            display: flex;
            gap: 30px;
        }

            .nav-center a {
                color: var(--gray);
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

                .nav-center a.active {
                    color: var(--accent);
                }

        .nav-right {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 2px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #333;
            color: #fff;
        }

        .btn-fill {
            background: #fff;
            color: #000;
        }

            .btn-fill:hover {
                background: var(--accent);
                color: #fff;
            }

        .page {
            display: none;
            padding: 120px 5% 60px;
            min-height: 100vh;
            opacity: 0;
            transform: translateY(10px);
        }

            .page.active {
                display: block;
                opacity: 1;
                transform: translateY(0);
            }

        /* Admin Panel */
        #admin-editor {
            background: #111;
            border: 1px dashed var(--accent);
            padding: 30px;
            margin-bottom: 40px;
            display: none;
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .track-card {
            background: var(--card);
            border: 1px solid #1a1a1a;
            padding: 20px;
            border-radius: 4px;
        }

        .track-img {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono';
            font-size: 0.7rem;
            color: #333;
            border: 1px solid #222;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card);
            padding: 50px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #222;
            position: relative;
        }

        input, select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            padding: 15px;
            color: #fff;
            margin: 10px 0 20px;
            outline: none;
        }

            input:focus {
                border-color: var(--accent);
            }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0%200%20200%20200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <header>
        <a href="#" class="logo" onclick="showPage('home')">CTIP</a>
        <nav class="nav-center">
            <a href="#" id="link-home" onclick="showPage('home')" class="active">Главная</a>
            <a href="#" id="link-feed" onclick="showPage('feed')">SERA</a>
            <a href="#" id="link-apply" onclick="showPage('apply')">Вакансии</a>
        </nav>
        <div class="nav-right" id="auth-buttons">
            <button class="btn btn-outline" onclick="openModal('login')">Вход</button>
            <button class="btn btn-fill" onclick="openModal('reg')">Join</button>
        </div>
    </header>

    <div id="home" class="page active">
        <div style="text-align: center; max-width: 800px; margin: 0 auto;">
            <p style="color: var(--accent); letter-spacing: 5px;">EST. 2026</p>
            <h1 style="font-size: clamp(3rem, 10vw, 6rem); line-height: 0.9;">FUTURE OF <br>SOUND</h1>
            <button class="btn btn-fill" onclick="showPage('apply')" style="margin-top: 30px; padding: 15px 40px;">СТАТЬ ЧАСТЬЮ</button>
        </div>
    </div>

    <div id="feed" class="page">
        <div id="admin-editor">
            <h2 style="margin-top:0">NEW RELEASE</h2>
            <input type="text" id="post-title" placeholder="Название трека">
            <input type="text" id="post-genre" placeholder="Жанр (напр. Phonk, Techno)">
            <textarea id="post-desc" placeholder="Описание или ссылка на скачивание"></textarea>
            <button class="btn btn-fill" onclick="createPost()">Опубликовать</button>
        </div>

        <h2 style="letter-spacing: 2px; text-transform: uppercase;">Latest Releases</h2>
        <div class="grid" id="posts-container">
            <p style="color: #444;">Загрузка данных...</p>
        </div>
    </div>

    <div id="apply" class="page">
        <div class="apply-container" style="max-width: 500px; margin: 0 auto;">
            <h2>APPLICATION</h2>
            <form action="https://formspree.io/f/mzdaqvkq" method="POST">
                <input type="text" name="alias" placeholder="ALIAS" required>
                <input type="email" name="email" placeholder="EMAIL" required>
                <textarea name="message" placeholder="PORTFOLIO LINKS"></textarea>
                <button type="submit" class="btn btn-fill" style="width: 100%;">Отправить анкету</button>
            </form>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">✕</span>
            <h2 id="modalTitle">ВХОД</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="btn btn-fill" id="auth-submit-btn" style="width: 100%;">Продолжить</button>
        </div>
    </div>

    <script>
        // INIT SUPABASE
        const SUPABASE_URL = 'https://mgalvfcnytusbklahkjy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_GRAiUwNcIIDaBwl8Ux1TuA_1JhaIv6h'; // Используем anon key
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMode = 'login';

        // AUTH FUNCTIONS
        async function handleAuth() {
        const email = document.querySelector('#auth-email').value;
        const password = document.querySelector('#auth-password').value;

        if (currentMode === 'reg') {
        const { error } = await _supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert('Успех! Проверь почту для подтверждения.');
        } else {
        const { error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else { closeModal(); checkUser(); }
        }
        }

        async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        const authSection = document.getElementById('auth-buttons');
        const adminPanel = document.getElementById('admin-editor');

        if (user) {
        authSection.innerHTML = `<span style="font-size: 0.7rem; color: #555; margin-right: 15px;">${user.email}</span><button class="btn btn-outline" onclick="_supabase.auth.signOut().then(()=>location.reload())">Выход</button>`;
        adminPanel.style.display = 'block';
        }
        }

        // DATABASE FUNCTIONS
        async function fetchPosts() {
        const { data, error } = await _supabase
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

        const container = document.getElementById('posts-container');
        if (error) { container.innerHTML = 'Ошибка загрузки'; return; }

        container.innerHTML = data.map(post => `
        <div class="track-card">
        <div class="track-img">CONTENT_ID_${post.id.substring(0,8)}</div>
        <strong>${post.title}</strong>
        <p style="color: var(--gray); font-size: 0.8rem; margin: 5px 0;">${post.genre || 'Experimental'}</p>
        <p style="font-size: 0.8rem; color: #555;">${post.content || ''}</p>
        </div>
        `).join('');
        }

        async function createPost() {
        const title = document.getElementById('post-title').value;
        const genre = document.getElementById('post-genre').value;
        const content = document.getElementById('post-desc').value;
        const { data: { user } } = await _supabase.auth.getUser();

        const { error } = await _supabase.from('posts').insert([
        { title, genre, content, user_id: user.id }
        ]);

        if (error) alert('Ошибка: ' + error.message);
        else { alert('Дроп выполнен!'); location.reload(); }
        }

        // NAVIGATION & UI
        function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-center a').forEach(l => l.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('link-' + pageId).classList.add('active');
        if(pageId === 'feed') fetchPosts();
        }

        function openModal(type) {
        currentMode = type;
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('modalTitle').innerText = type === 'login' ? 'ВХОД' : 'РЕГИСТРАЦИЯ';
        document.getElementById('auth-submit-btn').onclick = handleAuth;
        }

        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        // STARTUP
        window.onload = () => {
        checkUser();
        fetchPosts();
        };
    </script>
</body>
</html>
